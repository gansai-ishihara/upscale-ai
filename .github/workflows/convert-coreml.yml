# .github/workflows/convert-coreml.yml
# Real-ESRGAN PyTorch → CoreML 変換ワークフロー
# macOS ランナー上で coremltools を使って直接変換する

name: Convert Real-ESRGAN to CoreML

on:
  workflow_dispatch:
    inputs:
      model_variant:
        description: "モデル選択"
        required: true
        default: "x2plus"
        type: choice
        options:
          - x2plus
          - x4plus
          - x4plus_anime
      tile_size:
        description: "タイルサイズ (推奨: 256)"
        required: true
        default: "256"
        type: string
      compute_precision:
        description: "計算精度"
        required: true
        default: "float16"
        type: choice
        options:
          - float16
          - float32

jobs:
  convert:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy==1.26.4 torch==2.1.2 torchvision==0.16.2
          pip install basicsr==1.4.2 realesrgan gfpgan
          pip install coremltools==7.2
          pip install numpy==1.26.4 --force-reinstall --no-deps

      - name: Download model and convert PyTorch → CoreML
        env:
          MODEL_VARIANT: ${{ inputs.model_variant }}
          TILE_SIZE: ${{ inputs.tile_size }}
          COMPUTE_PRECISION: ${{ inputs.compute_precision }}
        run: |
          python3 << 'SCRIPT'
          import torch
          import coremltools as ct
          import os
          import shutil
          import urllib.request

          model_variant = os.environ["MODEL_VARIANT"]
          tile_size = int(os.environ["TILE_SIZE"])
          precision = os.environ["COMPUTE_PRECISION"]

          print(f"=== Model: {model_variant}, Tile: {tile_size}x{tile_size} ===")

          configs = {
              "x2plus": {
                  "url": "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.1/RealESRGAN_x2plus.pth",
                  "scale": 2, "num_block": 23,
              },
              "x4plus": {
                  "url": "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth",
                  "scale": 4, "num_block": 23,
              },
              "x4plus_anime": {
                  "url": "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.2.4/RealESRGAN_x4plus_anime_6B.pth",
                  "scale": 4, "num_block": 6,
              },
          }

          cfg = configs[model_variant]
          scale = cfg["scale"]
          output_size = tile_size * scale

          # Download model weights
          model_path = f"RealESRGAN_{model_variant}.pth"
          print(f"Downloading {cfg['url']}...")
          urllib.request.urlretrieve(cfg["url"], model_path)
          print(f"Downloaded: {model_path} ({os.path.getsize(model_path) / 1024 / 1024:.1f} MB)")

          # Load PyTorch model
          from basicsr.archs.rrdbnet_arch import RRDBNet

          model = RRDBNet(
              num_in_ch=3, num_out_ch=3, num_feat=64,
              num_block=cfg["num_block"], num_grow_ch=32, scale=scale,
          )

          loadnet = torch.load(model_path, map_location=torch.device("cpu"))
          if "params_ema" in loadnet:
              model.load_state_dict(loadnet["params_ema"], strict=True)
          elif "params" in loadnet:
              model.load_state_dict(loadnet["params"], strict=True)
          else:
              model.load_state_dict(loadnet, strict=True)

          model.eval()

          # Trace the model
          dummy_input = torch.randn(1, 3, tile_size, tile_size)
          traced_model = torch.jit.trace(model, dummy_input)

          print(f"=== Converting to CoreML ===")
          print(f"  Input:  1x3x{tile_size}x{tile_size}")
          print(f"  Output: 1x3x{output_size}x{output_size}")
          print(f"  Precision: {precision}")

          # Convert PyTorch → CoreML directly
          compute_precision = ct.precision.FLOAT16 if precision == "float16" else ct.precision.FLOAT32

          mlmodel = ct.convert(
              traced_model,
              inputs=[
                  ct.TensorType(
                      name="input",
                      shape=(1, 3, tile_size, tile_size),
                  )
              ],
              outputs=[
                  ct.TensorType(name="output"),
              ],
              compute_precision=compute_precision,
              minimum_deployment_target=ct.target.iOS16,
              convert_to="mlprogram",
          )

          # Metadata
          mlmodel.author = "Real-ESRGAN (Xintao Wang) - BSD 3-Clause"
          mlmodel.license = "BSD 3-Clause License"
          mlmodel.short_description = f"Real-ESRGAN {model_variant} super-resolution model (x{scale}, tile {tile_size}x{tile_size})"
          mlmodel.version = "1.0.0"

          # Save
          mlpackage_path = f"RealESRGAN_{model_variant}.mlpackage"
          mlmodel.save(mlpackage_path)

          total_size = sum(
              os.path.getsize(os.path.join(dp, f))
              for dp, _, fnames in os.walk(mlpackage_path) for f in fnames
          )
          print(f"\nCoreML model saved: {mlpackage_path}")
          print(f"Total size: {total_size / 1024 / 1024:.1f} MB")

          # ZIP for artifact
          shutil.make_archive(f"RealESRGAN_{model_variant}_coreml", "zip", ".", mlpackage_path)
          zip_size = os.path.getsize(f"RealESRGAN_{model_variant}_coreml.zip")
          print(f"ZIP archive: {zip_size / 1024 / 1024:.1f} MB")
          SCRIPT

      - name: Verify CoreML model
        env:
          MODEL_VARIANT: ${{ inputs.model_variant }}
          TILE_SIZE: ${{ inputs.tile_size }}
        run: |
          python3 << 'SCRIPT'
          import coremltools as ct
          import numpy as np
          import os

          model_variant = os.environ["MODEL_VARIANT"]
          tile_size = int(os.environ["TILE_SIZE"])
          scale = 2 if "x2" in model_variant else 4

          mlpackage_path = f"RealESRGAN_{model_variant}.mlpackage"

          print(f"=== Verifying CoreML model ===")

          model = ct.models.MLModel(mlpackage_path)

          spec = model.get_spec()
          print(f"  Description: {spec.description.metadata.shortDescription}")
          print(f"  Author: {spec.description.metadata.author}")

          dummy_input = np.random.rand(1, 3, tile_size, tile_size).astype(np.float32)
          prediction = model.predict({"input": dummy_input})

          output = prediction["output"]
          expected_shape = (1, 3, tile_size * scale, tile_size * scale)

          print(f"  Input shape:  {dummy_input.shape}")
          print(f"  Output shape: {output.shape}")
          print(f"  Expected:     {expected_shape}")

          assert output.shape == expected_shape, f"Shape mismatch! Got {output.shape}"
          print("\nCoreML model verification PASSED!")
          SCRIPT

      - name: Upload CoreML model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: "RealESRGAN-${{ inputs.model_variant }}-coreml-tile${{ inputs.tile_size }}-${{ inputs.compute_precision }}"
          path: "RealESRGAN_${{ inputs.model_variant }}_coreml.zip"
          retention-days: 90

      - name: Summary
        env:
          MODEL_VARIANT: ${{ inputs.model_variant }}
          TILE_SIZE: ${{ inputs.tile_size }}
          COMPUTE_PRECISION: ${{ inputs.compute_precision }}
        run: |
          if [[ "$MODEL_VARIANT" == *"x2"* ]]; then
            scale=2
          else
            scale=4
          fi

          output_size=$((TILE_SIZE * scale))

          echo "## CoreML Model Conversion Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Model | RealESRGAN_${MODEL_VARIANT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scale | x${scale} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tile Size | ${TILE_SIZE}x${TILE_SIZE} -> ${output_size}x${output_size} |" >> $GITHUB_STEP_SUMMARY
          echo "| Precision | ${COMPUTE_PRECISION} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS Target | iOS 16.0+ |" >> $GITHUB_STEP_SUMMARY
